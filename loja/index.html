<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — Oferte e Compre</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
      <a href="/" class="flex items-center gap-2 flex-shrink-0">
        <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center">
          <span class="text-white font-black text-sm">O</span>
        </div>
        <span class="font-bold text-gray-900 hidden sm:block">Oferte<span class="text-orange-500">&</span>Compre</span>
      </a>

      <!-- Search -->
      <form class="flex-1 max-w-lg" onsubmit="event.preventDefault(); const q=document.getElementById('search-input').value; if(q) window.location.href='?q='+encodeURIComponent(q);">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
          <input id="search-input" type="search" placeholder="Buscar produtos..."
            class="w-full pl-9 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent">
        </div>
      </form>

      <a href="/merchant/login.html" class="flex-shrink-0 text-sm text-gray-500 hover:text-orange-600 font-medium transition-colors">
        Sou lojista
      </a>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 py-8">
    <!-- Category filters -->
    <div class="flex gap-2 flex-wrap mb-8">
      <a href="/loja/" class="px-4 py-2 rounded-xl text-sm font-medium bg-orange-500 text-white">Todos</a>
      <a href="?categoria=Eletr%C3%B4nicos" class="px-4 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:border-orange-400 hover:text-orange-600 transition-colors">Eletrônicos</a>
      <a href="?categoria=Eletrodom%C3%A9sticos" class="px-4 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:border-orange-400 hover:text-orange-600 transition-colors">Eletrodomésticos</a>
      <a href="?categoria=M%C3%B3veis" class="px-4 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:border-orange-400 hover:text-orange-600 transition-colors">Móveis</a>
      <a href="?categoria=Moda" class="px-4 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:border-orange-400 hover:text-orange-600 transition-colors">Moda</a>
      <a href="?categoria=Automotivo" class="px-4 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:border-orange-400 hover:text-orange-600 transition-colors">Automotivo</a>
      <a href="?categoria=Outros" class="px-4 py-2 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:border-orange-400 hover:text-orange-600 transition-colors">Outros</a>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-20 text-gray-400">
      <div class="inline-block w-8 h-8 border-4 border-orange-200 border-t-orange-500 rounded-full animate-spin mb-4"></div>
      <p>Carregando produtos...</p>
    </div>

    <!-- Empty -->
    <div id="empty" class="hidden text-center py-20">
      <div class="text-6xl mb-4">📦</div>
      <h3 class="text-xl font-bold text-gray-700 mb-2">Nenhum produto encontrado</h3>
      <p class="text-gray-400">Tente outra categoria ou busca.</p>
    </div>

    <!-- Products grid -->
    <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/loja.js"></script>
  <script>loadShop();</script>
</body>
</html>
