<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produto — Oferte e Compre</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="toast" class="hidden fixed bottom-6 right-6 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg z-50"></div>

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center gap-4">
      <a href="/loja/" class="text-gray-400 hover:text-gray-700 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <a href="/" class="flex items-center gap-2">
        <div class="w-7 h-7 bg-orange-500 rounded-lg flex items-center justify-center">
          <span class="text-white font-black text-xs">O</span>
        </div>
        <span class="font-bold text-gray-900 text-sm">Oferte<span class="text-orange-500">&</span>Compre</span>
      </a>
    </div>
  </nav>

  <!-- Loading -->
  <div id="loading" class="text-center py-20 text-gray-400">
    <div class="inline-block w-8 h-8 border-4 border-orange-200 border-t-orange-500 rounded-full animate-spin mb-4"></div>
    <p>Carregando produto...</p>
  </div>

  <!-- Product content -->
  <div id="product-content" class="hidden max-w-6xl mx-auto px-4 py-10">
    <div class="grid md:grid-cols-2 gap-10">

      <!-- Images -->
      <div>
        <div class="bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm">
          <img id="img-main" src="" alt="" class="w-full h-80 object-contain p-4">
        </div>
        <div id="img-thumbs" class="flex gap-2 mt-3 flex-wrap"></div>
      </div>

      <!-- Info + Offer -->
      <div>
        <p id="product-category" class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2"></p>
        <h1 id="product-name" class="text-2xl font-bold text-gray-900 mb-1"></h1>
        <p id="product-store" class="text-sm text-gray-500 mb-4"></p>

        <div class="flex items-end justify-between mb-4">
          <div>
            <p class="text-xs text-gray-400">Preço sugerido de mercado</p>
            <p id="market-price" class="text-3xl font-black text-orange-600"></p>
          </div>
          <p id="product-stock" class="text-sm font-semibold"></p>
        </div>

        <p id="offer-stats" class="text-xs text-gray-400 mb-6"></p>

        <p id="product-description" class="text-sm text-gray-600 leading-relaxed mb-6"></p>

        <!-- Offer form -->
        <div id="offer-form-wrap" class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
          <h2 class="font-bold text-gray-900 mb-1">Faça sua oferta</h2>
          <p class="text-xs text-gray-400 mb-5">O lojista tem um preço mínimo secreto. Se sua oferta for aceita, eles entram em contato pelo WhatsApp.</p>

          <form id="offer-form" class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Seu valor (R$)</label>
              <input id="offer-amount" type="number" min="1" step="0.01" required
                class="w-full border-2 border-orange-300 focus:border-orange-500 rounded-xl px-4 py-3 text-xl font-bold text-gray-900 focus:outline-none transition-colors">
              <input id="offer-slider" type="range" class="w-full mt-3 accent-orange-500">
              <div class="flex justify-between text-xs text-gray-400 mt-1">
                <span>Oferta baixa</span>
                <span>Oferta alta</span>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1.5">Seu nome *</label>
                <input id="customer-name" type="text" required placeholder="João Silva"
                  class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1.5">WhatsApp *</label>
                <input id="customer-phone" type="tel" required placeholder="(11) 99999-9999"
                  class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
              </div>
            </div>

            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1.5">Email (opcional)</label>
              <input id="customer-email" type="email" placeholder="seu@email.com"
                class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
            </div>

            <button id="offer-btn" type="submit"
              class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3.5 rounded-xl font-bold transition-colors shadow-sm text-sm">
              Enviar Oferta 🚀
            </button>

            <p class="text-xs text-center text-gray-400">
              Sua oferta é instantânea. Se aceita, o lojista entra em contato via WhatsApp.
            </p>
          </form>
        </div>

        <!-- Result (shown after offer) -->
        <div id="offer-result" class="hidden"></div>
      </div>
    </div>
  </div>

  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/supabase-init.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/loja.js"></script>
  <script>loadProduct();</script>
</body>
</html>
