<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Oferte e Compre</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div id="toast" class="hidden fixed bottom-6 right-6 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg z-50"></div>

  <div class="w-full max-w-md px-4">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 mb-6">
        <div class="w-9 h-9 bg-orange-500 rounded-xl flex items-center justify-center">
          <span class="text-white font-black">O</span>
        </div>
        <span class="font-bold text-xl text-gray-900">Oferte<span class="text-orange-500">&</span>Compre</span>
      </a>
      <h1 class="text-2xl font-bold text-gray-900">Entrar na sua loja</h1>
      <p class="text-gray-500 mt-1 text-sm">Acesse seu painel de lojista</p>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
      <form id="login-form" onsubmit="merchantLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input id="email" type="email" required placeholder="seu@email.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition-all">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Senha</label>
          <input id="password" type="password" required placeholder="••••••••"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition-all">
        </div>
        <button id="submit-btn" type="submit"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold transition-colors mt-2">
          Entrar
        </button>
      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/merchant.js"></script>
  <script>
    // If already logged in, redirect
    getSession().then(s => { if (s) window.location.href = '/merchant/dashboard.html'; });
  </script>
</body>
</html>
