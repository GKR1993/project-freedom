<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — Oferte e Compre</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-10">

  <div id="toast" class="hidden fixed bottom-6 right-6 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg z-50"></div>

  <div class="w-full max-w-md px-4">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 mb-6">
        <div class="w-9 h-9 bg-orange-500 rounded-xl flex items-center justify-center">
          <span class="text-white font-black">O</span>
        </div>
        <span class="font-bold text-xl text-gray-900">Oferte<span class="text-orange-500">&</span>Compre</span>
      </a>
      <h1 class="text-2xl font-bold text-gray-900">Criar conta de lojista</h1>
      <p class="text-gray-500 mt-1 text-sm">Comece a vender em minutos, é grátis</p>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
      <form id="register-form" onsubmit="merchantRegister(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Nome da loja</label>
          <input id="store_name" type="text" required placeholder="Ex: Eletrônicos Silva"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Seu nome</label>
          <input id="owner_name" type="text" required placeholder="João Silva"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">WhatsApp</label>
          <input id="phone" type="tel" required placeholder="(11) 99999-9999"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input id="email" type="email" required placeholder="seu@email.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Senha</label>
          <input id="password" type="password" required placeholder="Mínimo 6 caracteres" minlength="6"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent">
        </div>
        <button id="submit-btn" type="submit"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-semibold transition-colors mt-2">
          Criar conta grátis
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-6">
      Já tem conta?
      <a href="/merchant/login.html" class="text-orange-600 hover:text-orange-700 font-semibold">Entrar</a>
    </p>
  </div>

  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/supabase-init.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/merchant.js"></script>
</body>
</html>
